<!DOCTYPE html>

<html class="scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sunshadow Merchandise | Global Sourcing Authority</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/js/htmx.min.js"></script>
    <script defer src="/js/alpine.min.js"></script>
    <script src="tailwind.config.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .architectural-grid {
            background-image: radial-gradient(circle, #443f3a 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.03;
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed-dim">
    <!-- TopNavBar -->
    <div hx-get="partial/header.html" hx-trigger="load" hx-swap="outerHTML"></div>
    <main class="relative">
        <!-- Hero Section -->
        <div hx-get="partial/hero.html" hx-trigger="load" hx-swap="outerHTML"></div>
        <!-- Specializations Section -->
        <div hx-get="partial/strategic-categories.html" hx-trigger="load" hx-swap="outerHTML"></div>
        <!-- CTA Section -->
        <div hx-get="partial/cta.html" hx-trigger="load" hx-swap="outerHTML"></div>
        <!-- Stats/Tracker Area -->
        <div hx-get="partial/stats.html" hx-trigger="load" hx-swap="outerHTML"></div>
    </main>
    <!-- Footer -->
    <div hx-get="partial/footer.html" hx-trigger="load" hx-swap="outerHTML"></div>
</body>

</html>
